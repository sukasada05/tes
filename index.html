<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUKOPS - SISTEM PELAPORAN</title>
    <style>
        /* --- Windows 98 Ultra Classic --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #008080;
            padding: 8px;
            font-family: 'Times New Roman', 'Courier New', 'MS Sans Serif', 'Tahoma', 'Arial', sans-serif;
            color: #000;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #c0c0c0;
            padding: 8px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: inset 1px 1px 0 #dfdfdf;
        }
        .window-title {
            background: #000080;
            color: #fff;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            cursor: default;
            letter-spacing: 0.5px;
            font-family: 'Times New Roman', 'Courier New', 'MS Sans Serif', sans-serif;
        }
        .window-title span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .window-title .btn-close {
            background: #c0c0c0;
            color: #000;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 0 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            line-height: 16px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .window-title .btn-close:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        .nav-buttons {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            background: #c0c0c0;
            padding: 4px;
            border: 1px solid;
            border-color: #808080 #ffffff #ffffff #808080;
        }
        .nav-btn {
            flex: 1;
            padding: 6px 4px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            background: #c0c0c0;
            color: #000;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            min-width: 50px;
            font-family: 'Times New Roman', 'Courier New', 'MS Sans Serif', sans-serif;
        }
        .nav-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        .nav-btn.active {
            border-color: #808080 #ffffff #ffffff #808080;
            background: #d0d0d0;
        }
        .field-group {
            margin-bottom: 6px;
            padding: 4px;
            border: 1px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            background: #d0d0d0;
        }
        .field-group label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            color: #000;
            margin-bottom: 2px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        select,
        input[type="file"],
        input[type="datetime-local"],
        textarea {
            width: 100%;
            padding: 4px 6px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            background: #ffffff;
            color: #000;
            font-size: 13px;
            font-family: 'Times New Roman', 'Courier New', 'MS Sans Serif', sans-serif;
        }
        select:focus,
        input:focus,
        textarea:focus {
            border-color: #000080 #ffffff #ffffff #000080;
            outline: none;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .previewBox {
            background: #ffffff;
            padding: 4px 6px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            margin-top: 2px;
            min-height: 28px;
            font-size: 12px;
            color: #000;
            word-break: break-all;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        canvas {
            width: 100%;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            margin: 6px 0;
            background: #000;
            display: block;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            margin: 6px 0;
            flex-wrap: wrap;
        }
        .action-buttons button {
            flex: 1;
            padding: 6px 12px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            background: #c0c0c0;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Times New Roman', 'Courier New', 'MS Sans Serif', sans-serif;
            min-width: 70px;
        }
        .action-buttons button:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        .action-buttons button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .jadwal-section {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px;
            margin-bottom: 6px;
        }
        .section-title {
            font-weight: bold;
            font-size: 12px;
            color: #000;
            margin: 4px 0;
            background: #d0d0d0;
            padding: 2px 4px;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .section-divider {
            border-top: 1px dashed #808080;
            margin: 6px 0;
        }
        .group-box {
            padding: 4px;
            margin-bottom: 4px;
        }
        .group-box-hari-ini {
            background: #e8f0e8;
            border: 1px solid #008000;
        }
        .group-box-besok {
            background: #f0e8e0;
            border: 1px solid #8a6a2a;
        }
        .group-box label {
            font-weight: bold;
            font-size: 11px;
            display: block;
            margin-bottom: 2px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .group-box-hari-ini label {
            color: #004400;
        }
        .group-box-besok label {
            color: #664400;
        }
        .whatsapp-btn {
            width: 100%;
            padding: 6px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            background: #c0c0c0;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin: 4px 0;
            font-family: 'Times New Roman', 'Courier New', 'MS Sans Serif', sans-serif;
            font-size: 13px;
        }
        .whatsapp-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        #hanpanganContent iframe {
            width: 100%;
            height: 450px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            background: #ffffff;
        }

            }

        .status-bar {
            background: #c0c0c0;
            padding: 2px 6px;
            border: 1px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            font-size: 11px;
            color: #000;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            background: #ffffcc;
            color: #000;
            font-weight: bold;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            font-size: 13px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .notification.success {
            background: #ccffcc;
        }
        .notification.error {
            background: #ffcccc;
        }
        .notification.warning {
            background: #ffffcc;
        }
        .modal-ai {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-ai.show {
            display: flex;
        }
        .modal-ai-content {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            max-width: 480px;
            width: 95%;
            max-height: 80vh;
            overflow: hidden;
            padding: 10px;
        }
        .modal-ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #808080;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .modal-ai-header h3 {
            font-size: 14px;
            margin: 0;
            color: #000;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .modal-close {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            padding: 0 8px;
            line-height: 20px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .modal-close:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        .modal-ai-body {
            max-height: 50vh;
            overflow-y: auto;
        }
        .modal-template-item {
            background: #ffffff;
            padding: 6px 8px;
            border: 1px solid #808080;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .modal-template-item:hover {
            background: #d0d0d0;
        }
        .modal-template-text {
            font-size: 12px;
            color: #000;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .loading-templates {
            color: #000;
            text-align: center;
            padding: 20px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: #444;
            font-size: 11px;
        }
        .mt-1 {
            margin-top: 4px;
        }
        .mb-1 {
            margin-bottom: 4px;
        }
        .counter-value {
            display: inline-block;
            padding: 0 8px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            background: #ffffff;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Times New Roman', 'Courier New', sans-serif;
        }
        .counter-value::before {
            content: '📊 ';
        }
        .supabase-indicator {
            position: fixed;
            top: 6px;
            right: 6px;
            z-index: 999;
            width: 12px;
            height: 12px;
            cursor: default;
        }
        .indicator-dot {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid #000;
            transition: background 0.3s;
        }
        .indicator-online .indicator-dot {
            background: #00aa00;
        }
        .indicator-offline .indicator-dot {
            background: #ff0000;
        }
        .indicator-checking .indicator-dot {
            background: #ffcc00;
        }
        .indicator-tooltip {
            display: none;
        }
        @media (max-width: 480px) {
            .container {
                padding: 4px;
            }
            .nav-btn {
                font-size: 10px;
                padding: 4px 2px;
                min-width: 40px;
            }
            .action-buttons button {
                font-size: 11px;
                padding: 4px 6px;
                min-width: 50px;
            }
            .window-title {
                font-size: 11px;
                padding: 2px 6px;
            }
            .section-title {
                font-size: 11px;
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }
            .section-title .date-label {
                font-size: 10px;
            }
        }
        @media (max-width: 360px) {
            .nav-buttons {
                gap: 2px;
            }
            .nav-btn {
                font-size: 9px;
                padding: 3px 1px;
                min-width: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Supabase Indicator -->
    <div id="supabaseIndicator" class="supabase-indicator indicator-checking">
        <div class="indicator-dot"></div>
        <span class="indicator-tooltip">Menghubungkan...</span>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="container">

        <!-- Title Bar -->
        <div class="window-title">
            <span>📋 DUKOPS - SISTEM PELAPORAN</span>
            <button class="btn-close" onclick="if(confirm('Tutup aplikasi?')){document.body.innerHTML='';}">✕</button>
        </div>

        <!-- Nav -->
        <div class="nav-buttons">
            <button class="nav-btn active" id="btnDukops" onclick="showDukops()">📝 DUKOPS</button>
            <button class="nav-btn" id="btnJadwal" onclick="showJadwalPiketBaru()">📅 PIKET</button>
            <button class="nav-btn" id="btnHanpangan" onclick="showHanpangan()">🌾 HANPANGAN</button>
        </div>

        <!-- DUKOPS -->
        <div id="dukopsContent">
            <div class="field-group">
                <label>📍 Pilih Desa/Kelurahan:</label>
                <select id="selectDesa" onchange="loadSelectedDesa()">
                    <option value="">-- Pilih desa/Kelurahan --</option>
                </select>
                <div id="loadingDesa" class="hidden text-muted" style="margin-top:2px;">⏳ Memuat...</div>
                <div class="previewBox" id="previewDesa" style="display:none;"></div>
            </div>

            <div class="field-group">
                <label>🗺️ Koordinat:</label>
                <div id="loadingKoordinat" class="hidden text-muted">⏳ Memuat koordinat...</div>
                <div class="previewBox" id="previewKordinat"><span class="text-muted">Pilih desa untuk melihat koordinat</span></div>
            </div>

            <div class="field-group">
                <label>📷 Foto Kegiatan:</label>
                <input type="file" id="gambar" accept="image/*" onchange="previewImage()">
                <div class="previewBox" id="previewGambar"></div>
            </div>

            <div class="field-group">
                <label>📅 Tanggal & Waktu: <span id="tanggalWaktuLabelText" style="font-weight:normal;">Pilih tanggal & waktu</span></label>
                <input type="datetime-local" id="tanggalWaktu" onchange="updateDatePreview()">
            </div>

            <div class="field-group">
                <label>📝 Narasi Kegiatan:</label>
                <textarea id="narasi" rows="5" placeholder="Masukkan narasi kegiatan..." oninput="checkInputCompletion()"></textarea>
                <div style="margin-top:4px;">
                    <button class="nav-btn" id="aiTemplateBtn" style="width:100%;font-size:12px;">🤖 Template AI</button>
                </div>
            </div>

            <canvas id="canvas"></canvas>

            <div class="action-buttons">
                <button id="submitBtn" onclick="processSubmission()" disabled>📤 KIRIM</button>
                <button id="resetBtn" onclick="resetAll()">🔄 RESET</button>
            </div>

            <div class="status-bar">
                <span id="submissionCounter">📊 0</span>
                <span id="statusInfo">Siap</span>
            </div>
        </div>

        <!-- JADWAL PIKET -->
        <div id="jadwalPiketContainerBaru" style="display:none;">
            <div class="jadwal-section">
                <div class="section-title">📅 JADWAL PIKET</div>

                <!-- Koramil -->
                <div class="section-title">
                    🏛️ Piket Koramil
                </div>
                <div class="group-box group-box-hari-ini">
                    <label id="labelHariIniKoramil">📌 HARI INI</label>
                    <select id="j_nama1a_baru" style="width:100%;margin-bottom:2px;"><option value="">Nama 1</option></select>
                    <select id="j_nama1b_baru" style="width:100%;"><option value="">Nama 2</option></select>
                </div>
                <div class="group-box group-box-besok">
                    <label id="labelBesokKoramil">📌 BESOK</label>
                    <select id="j_nama2a_baru" style="width:100%;margin-bottom:2px;"><option value="">Nama 1</option></select>
                    <select id="j_nama2b_baru" style="width:100%;"><option value="">Nama 2</option></select>
                </div>

                <div class="section-divider"></div>

                <!-- Kediaman -->
                <div class="section-title">
                    🏠 Jaga Kediaman
                </div>
                <div class="group-box group-box-hari-ini">
                    <label id="labelHariIniKediaman">📌 HARI INI</label>
                    <select id="j_nama3a_baru" style="width:100%;margin-bottom:2px;"><option value="">Nama 1</option></select>
                    <select id="j_nama3b_baru" style="width:100%;"><option value="">Nama 2</option></select>
                </div>
                <div class="group-box group-box-besok">
                    <label id="labelBesokKediaman">📌 BESOK</label>
                    <select id="j_nama3c_baru" style="width:100%;margin-bottom:2px;"><option value="">Nama 1</option></select>
                    <select id="j_nama3d_baru" style="width:100%;"><option value="">Nama 2</option></select>
                </div>

                <div class="section-divider"></div>

                <!-- Makodim -->
                <div class="section-title">
                    🏢 Piket Makodim
                </div>
                <div class="group-box group-box-hari-ini">
                    <label id="labelHariIniMakodim">📌 HARI INI</label>
                    <select id="j_nama4a_baru" style="width:100%;margin-bottom:2px;"><option value="">Nama 1</option></select>
                    <select id="j_nama4b_baru" style="width:100%;"><option value="">Nama 2</option></select>
                </div>
                <div class="group-box group-box-besok">
                    <label id="labelBesokMakodim">📌 BESOK</label>
                    <select id="j_nama4c_baru" style="width:100%;margin-bottom:2px;"><option value="">Nama 1</option></select>
                    <select id="j_nama4d_baru" style="width:100%;"><option value="">Nama 2</option></select>
                </div>

                <button class="whatsapp-btn" id="whatsappBtnBaru">💬 KIRIM KE WHATSAPP</button>

                <div style="margin-top:4px;">
                    <textarea id="j_hasilPesanBaru" rows="4" readonly placeholder="Preview pesan..." style="width:100%;padding:4px;border:2px solid;border-color:#808080 #ffffff #ffffff #808080;background:#ffffff;font-size:12px;font-family:'Times New Roman','Courier New',sans-serif;"></textarea>
                    <div class="text-muted text-center" id="previewInfo" style="font-size:11px;margin-top:2px;">⏳ Memuat data dari Supabase...</div>
                </div>
            </div>
        </div>

        <!-- HANPANGAN -->
        <div id="hanpanganContent" style="display:none;">
            <div class="field-group" style="padding:4px;">
                <div style="font-weight:bold;font-size:13px;margin-bottom:4px;font-family:'Times New Roman','Courier New',sans-serif;">🌾 HANPANGAN</div>
                <iframe src="https://sukasada05.github.io/Hanpangan/" title="HANPANGAN"></iframe>
            </div>
        </div>

    </div>

    <!-- Modal AI -->
    <div id="templateModal" class="modal-ai">
        <div class="modal-ai-content">
            <div class="modal-ai-header">
                <h3>🤖 Template Narasi AI</h3>
                <button class="modal-close" id="closeModalBtn">✕</button>
            </div>
            <div class="modal-ai-tabs" id="modalTabs"></div>
            <div class="modal-ai-body" id="modalBody"></div>
        </div>
    </div>

    <!-- JS Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ================= KONFIGURASI =================
        const GOOGLE_APPS_SCRIPT_WEBHOOK = "https://script.google.com/macros/s/AKfycbwJN7fFAjmAgwPiPpsPoASUjDjXFdGwexBvi2ECYNSlWn6Pp1UliQYJ9G-Wz3fA3Adj/exec";
        const TARGET_LAPORAN = 9;

        const GITHUB_URLS = {
            HANPANGAN: "https://raw.githubusercontent.com/sukasada05/dukops4/main/data/hanpangan.txt",
            PIKET: "https://raw.githubusercontent.com/sukasada05/dukops4/main/data/piket.txt"
        };

        // ================= VARIABEL =================
        let img = new Image();
        let selectedDesa = "";
        let kordinatList = [];
        let currentKoordinat = "";
        let tanggalWaktu = "";
        let submissionCount = 0;
        let submittedDates = [];
        let desaCounter = {};
        let templateData = null;
        let activeTab = null;
        let categoryKeys = [];
        let supabaseClient = null;
        let isSupabaseConnected = false;
        let autoSaveTimer = null;
        let JadwalData2 = { daftarNama: [], daftarHanpangan: [], currentHanpangan: "" };
        const JADWAL_DROPDOWN_IDS = ['j_nama1a_baru', 'j_nama1b_baru', 'j_nama2a_baru', 'j_nama2b_baru',
            'j_nama3a_baru', 'j_nama3b_baru', 'j_nama3c_baru', 'j_nama3d_baru',
            'j_nama4a_baru', 'j_nama4b_baru', 'j_nama4c_baru', 'j_nama4d_baru'
        ];

        // ================= DOM READY =================
        document.addEventListener('DOMContentLoaded', function() {
            loadDesaList();
            resetCanvas();
            loadLastSubmittedDates();
            loadDesaCounter();
            loadTemplatesFromGitHub();

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('tanggalWaktu').value = `${year}-${month}-${day}T${hours}:${minutes}`;
            updateDatePreview();

            const savedCount = localStorage.getItem('dukopsSubmissionCount');
            submissionCount = savedCount ? parseInt(savedCount) : 0;
            updateCounterDisplay();

            setupAITemplateButton();
            setupJadwalPiket();

            initSupabase();

            // Update label tanggal setiap menit
            updateAllDateLabels();
            setInterval(updateAllDateLabels, 60000);

            console.log('✅ DUKOPS APP READY');
        });

        // ================= UPDATE LABEL TANGGAL =================
        function updateAllDateLabels() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const formatDate = (date) => {
                const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                return days[date.getDay()] + ", " + date.getDate() + " " + months[date.getMonth()] + " " + date.getFullYear();
            };

        // ================= FUNGSI BACKEND =================
        async function sendToBackend(action, data = {}) {
            try {
                const getActions = ['listFiles', 'getConfig', 'test', 'getJadwalData',
                    'getPetugas', 'getPetugasByDate', 'getJadwalEpoch', 'cekGiliran',
                    'getPersonelList', 'getDesaList', 'status', 'unzipStatus',
                    'checkTriggers', 'checkLog', 'getFailed'
                ];

                if (getActions.includes(action)) {
                    let url = `${GOOGLE_APPS_SCRIPT_WEBHOOK}?action=${action}`;
                    if (action === 'listFiles') {
                        if (data.desaFilter) url += `&desaFilter=${encodeURIComponent(data.desaFilter)}`;
                        if (data.monthFilter) url += `&monthFilter=${encodeURIComponent(data.monthFilter)}`;
                        if (data.readZips) url += `&readZips=true`;
                    } else if (action === 'getJadwalData') {
                        if (data.type) url += `&type=${encodeURIComponent(data.type)}`;
                    } else if (action === 'getPetugasByDate') {
                        if (data.tanggal) url += `&tanggal=${encodeURIComponent(data.tanggal)}`;
                    } else if (action === 'getJadwalEpoch') {
                        if (data.hari) url += `&hari=${encodeURIComponent(data.hari)}`;
                    } else if (action === 'cekGiliran') {
                        if (data.nama) url += `&nama=${encodeURIComponent(data.nama)}`;
                    }
                    const response = await fetch(url);
                    return await response.json();
                } else {
                    const formData = new FormData();
                    formData.append('action', action);
                    Object.keys(data).forEach(key => {
                        if (data[key] !== undefined && data[key] !== null) {
                            if (key === 'fileData' && typeof data[key] === 'string') {
                                formData.append(key, data[key]);
                            } else {
                                formData.append(key, String(data[key]));
                            }
                        }
                    });
                    const response = await fetch(GOOGLE_APPS_SCRIPT_WEBHOOK, {
                        method: 'POST',
                        body: formData
                    });
                    return await response.json();
                }
            } catch (error) {
                console.error(`Error in ${action}:`, error);
                return { success: false, error: error.message };
            }
        }

        // ================= UPLOAD DRIVE =================
        async function uploadToGoogleDrive(zipBlob, zipFileName, desaName, date) {
            try {
                const base64Data = await blobToBase64(zipBlob);
                const desaInfo = normalizeDesaName(desaName);
                const result = await sendToBackend('uploadDrive', {
                    fileName: zipFileName,
                    fileData: base64Data,
                    year: date.getFullYear().toString(),
                    month: date.toLocaleDateString('id-ID', { month: 'long' }),
                    desa: desaInfo.cleanName,
                    mimeType: 'application/zip'
                });
                return result.success === true;
            } catch (error) {
                console.error('Error upload ke Drive:', error);
                return false;
            }
        }

        async function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(blob);
            });
        }

        // ================= DESA & KOORDINAT =================
        function normalizeDesaName(desaName) {
            if (!desaName) return { original: "", normalized: "", cleanName: "" };
            let normalized = desaName.replace(/^Desa\s+/i, '').replace(/^Kelurahan\s+/i, '')
                .replace(/Kel\.\s*/gi, '').replace(/Kel\s/gi, '').trim();
            return {
                original: desaName,
                normalized: normalized,
                cleanName: normalized.replace(/_/g, ' ')
            };
        }

        function updatePreview() {
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            if (img.src && img.complete) {
                canvas.width = 800;
                canvas.height = Math.round(canvas.width * (img.height / img.width));
            } else {
                canvas.width = 800;
                canvas.height = Math.round(canvas.width * (9 / 16));
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (img.src && img.complete) {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (selectedDesa || currentKoordinat || tanggalWaktu) {
                ctx.textAlign = "right";
                // FONT ARIAL STANDAR DINAS
                ctx.font = "bold 32px Arial, Helvetica, sans-serif";
                const bottomMargin = 20;
                const lineHeight = 38;
                const rightMargin = 10;

                if (selectedDesa) {
                    const desaInfo = normalizeDesaName(selectedDesa);
                    const displayDesaName = desaInfo.cleanName;
                    const watermarkText = (displayDesaName === "Sukasada" || displayDesaName === "SUKASADA") ?
                        "Babinsa Kelurahan Sukasada" :
                        "Babinsa " + displayDesaName;
                    ctx.fillStyle = "white";
                    ctx.shadowColor = "rgba(0,0,0,0.8)";
                    ctx.shadowBlur = 4;
                    ctx.fillText(watermarkText, canvas.width - rightMargin, canvas.height - bottomMargin - (lineHeight * 2));
                    ctx.shadowBlur = 0;
                }

                if (currentKoordinat) {
                    ctx.fillStyle = "white";
                    ctx.shadowColor = "rgba(0,0,0,0.8)";
                    ctx.shadowBlur = 4;
                    ctx.fillText(currentKoordinat, canvas.width - rightMargin, canvas.height - bottomMargin - lineHeight);
                    ctx.shadowBlur = 0;
                }

                if (tanggalWaktu) {
                    const date = new Date(tanggalWaktu);
                    const dateText = date.toLocaleDateString("id-ID", {
                        day: "2-digit",
                        month: "long",
                        year: "numeric"
                    }) + ", " + date.toLocaleTimeString("id-ID", {
                        hour: "2-digit",
                        minute: "2-digit",
                        second: "2-digit"
                    });
                    ctx.fillStyle = "white";
                    ctx.shadowColor = "rgba(0,0,0,0.8)";
                    ctx.shadowBlur = 4;
                    ctx.fillText(dateText, canvas.width - rightMargin, canvas.height - bottomMargin);
                    ctx.shadowBlur = 0;
                }
            }
        }

        // ================= SUBMIT LAPORAN =================
        function validateSubmission() {
            if (!selectedDesa) { showNotification("Masukkan nama desa terlebih dahulu", "warning"); return false; }
            if (!currentKoordinat) { showNotification("Koordinat tidak valid", "warning"); return false; }
            if (!tanggalWaktu) { showNotification("Isi tanggal dan waktu", "warning"); return false; }
            if (!img.src || !img.complete) { showNotification("Upload foto kegiatan", "warning"); return false; }
            if (!document.getElementById("narasi").value.trim()) { showNotification("Isi narasi kegiatan", "warning");
            return false; }
            return true;
        }

        function isSameDateMonthSubmission() {
            if (!tanggalWaktu) return false;
            const currentDate = new Date(tanggalWaktu);
            return submittedDates.some(dateStr => {
                const date = new Date(dateStr);
                return date.getDate() === currentDate.getDate() && date.getMonth() === currentDate.getMonth();
            });
        }

        async function processSubmission() {
            if (!validateSubmission()) return;
            if (isSameDateMonthSubmission()) {
                showNotification("⚠ Sudah ada laporan di tanggal dan bulan yang sama!", "warning");
                return;
            }

            const button = document.getElementById("submitBtn");
            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = '⏳ Memproses...';

            try {
                const canvas = document.getElementById("canvas");
                const imgData = canvas.toDataURL("image/png");
                const narasi = document.getElementById("narasi").value;
                const date = new Date(tanggalWaktu);

                const day = String(date.getDate()).padStart(2, '0');
                const monthNum = String(date.getMonth() + 1);
                const monthName = date.toLocaleDateString('id-ID', { month: 'long' });
                const year = date.getFullYear();
                const desaInfo = normalizeDesaName(selectedDesa);

                const fileNameInsideZipImage = `${desaInfo.cleanName} ${day} ${monthName} ${year} Dukops.png`;
                const fileNameInsideZipNarasi = `${desaInfo.cleanName} ${day} ${monthName} ${year} Narasi.txt`;
                const zipFileName = `${desaInfo.cleanName} ${day} ${monthNum} ${year}.zip`;

                const formattedDate = date.toLocaleDateString('id-ID', {
                    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
                });
                const narasiContent = `${formattedDate}\tBabinsa ${desaInfo.cleanName} ${narasi}`;

                const zip = new JSZip();
                zip.file(fileNameInsideZipNarasi, narasiContent);
                zip.file(fileNameInsideZipImage, imgData.split("base64,")[1], { base64: true });

                const content = await zip.generateAsync({ type: "blob" });

                // ===== DOWNLOAD ZIP =====
                const a = document.createElement("a");
                a.href = URL.createObjectURL(content);
                a.download = zipFileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // ===== UPLOAD TO GOOGLE DRIVE =====
                const driveUploaded = await uploadToGoogleDrive(content, zipFileName, selectedDesa, date);
                const desaData = updateDesaCounter(selectedDesa, zipFileName);

                if (driveUploaded) {
                    showNotification(`✔ Laporan berhasil disimpan ke Drive! (${desaData.count}/${TARGET_LAPORAN} laporan)`,
                        "success");
                } else {
                    showNotification(`⚠ Laporan hanya didownload, gagal simpan ke Drive`, "warning");
                }

                if (desaData.count >= 9) {
                    showThankYouPopup(desaInfo.cleanName, desaData.count);
                }

                updateCounter();
                saveSubmittedDate(tanggalWaktu);

            } catch (error) {
                console.error("Error:", error);
                showNotification("❌ Gagal mengirim laporan", "error");
            } finally {
                button.disabled = false;
                button.innerHTML = '📤 KIRIM';
            }
        }

        function updateDesaCounter(desaName, fileName) {
            const date = new Date(tanggalWaktu);
            const monthYear = date.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

            if (!desaCounter[desaName]) {
                desaCounter[desaName] = { count: 0, files: [], month: monthYear };
            }

            if (desaCounter[desaName].month !== monthYear) {
                desaCounter[desaName] = { count: 1, files: [fileName], month: monthYear };
            } else {
                desaCounter[desaName].count++;
                desaCounter[desaName].files.push(fileName);
                if (desaCounter[desaName].files.length > TARGET_LAPORAN) {
                    desaCounter[desaName].files.shift();
                }
            }

            localStorage.setItem('dukopsDesaCounter', JSON.stringify(desaCounter));
            return desaCounter[desaName];
        }

        function setupAITemplateButton() {
            const openModalBtn = document.getElementById('aiTemplateBtn');
            if (!openModalBtn) return;

            openModalBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const modal = document.getElementById('templateModal');
                if (!modal) return;

                if (!templateData) {
                    const modalBody = document.getElementById('modalBody');
                    if (modalBody) {
                        modalBody.innerHTML =
                            '<div class="loading-templates">⏳ Memuat template...</div>';
                    }
                    modal.classList.add('show');
                    loadTemplatesFromGitHub().then(() => {
                        if (templateData) {
                            renderModalTabs();
                            renderModalTemplateList();
                        }
                    });
                } else {
                    renderModalTabs();
                    renderModalTemplateList();
                    modal.classList.add('show');
                }
            });

            const closeModalBtn = document.getElementById('closeModalBtn');
            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', function() {
                    document.getElementById('templateModal').classList.remove('show');
                });
            }

            window.addEventListener('click', function(e) {
                const modal = document.getElementById('templateModal');
                if (modal && e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }

        async function loadTemplatesFromGitHub() {
            try {
                const response = await fetch('template-narasi.json?t=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                templateData = data.templates;
                categoryKeys = Object.keys(templateData);
                if (categoryKeys.length > 0) activeTab = categoryKeys[0];
                console.log("✅ Template AI dimuat:", categoryKeys.length, "kategori");
                return true;
            } catch (error) {
                console.error("❌ Gagal memuat template:", error);
                const modalBody = document.getElementById('modalBody');
                if (modalBody) {
                    modalBody.innerHTML =
                        '<div class="loading-templates" style="color:#ff0000;">❌ Gagal memuat template. Cek koneksi!</div>';
                }
                return false;
            }
        }

        function renderModalTabs() {
            const modalTabs = document.getElementById('modalTabs');
            if (!modalTabs) return;
            modalTabs.innerHTML = "";
            if (!categoryKeys.length) {
                modalTabs.innerHTML = '<div class="text-muted">Memuat kategori...</div>';
                return;
            }
            const selectWrapper = document.createElement('div');
            selectWrapper.style.cssText = 'width:100%;margin-bottom:6px;';
            const selectElement = document.createElement('select');
            selectElement.style.cssText =
                'width:100%;padding:3px 4px;border:2px solid;border-color:#808080 #ffffff #ffffff #808080;background:#ffffff;font-family:"Times New Roman","Courier New",sans-serif;';
            categoryKeys.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                if (activeTab === key) option.selected = true;
                selectElement.appendChild(option);
            });
            selectElement.onchange = (e) => {
                activeTab = e.target.value;
                renderModalTemplateList();
            };
            selectWrapper.appendChild(selectElement);
            modalTabs.appendChild(selectWrapper);
        }

        function renderModalTemplateList() {
            const modalBody = document.getElementById('modalBody');
            if (!modalBody) return;
            if (!templateData || !templateData[activeTab]) {
                modalBody.innerHTML = '<div class="text-muted">❌ Template tidak ditemukan</div>';
                return;
            }
            const templates = templateData[activeTab];
            if (templates.length === 0) {
                modalBody.innerHTML = '<div class="text-muted">📭 Belum ada template</div>';
                return;
            }
            let html = '<div class="modal-template-list">';
            templates.forEach((template, idx) => {
                const escapedTemplate = template.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g,
                '\\n');
                const displayTemplate = template.length > 120 ? template.substring(0, 120) + '...' : template;
                html += `
                    <div class="modal-template-item" onclick="window.selectTemplate('${escapedTemplate}')">
                        <div style="font-size:0.6rem;color:#008000;margin-bottom:2px;font-family:'Times New Roman','Courier New',sans-serif;">#${idx + 1}</div>
                        <div class="modal-template-text">${displayTemplate}</div>
                    </div>
                `;
            });
            html += '</div>';
            modalBody.innerHTML = html;
        }

        window.selectTemplate = function(template) {
            console.log("✅ Template dipilih:", template.substring(0, 50) + '...');
            const narasiField = document.getElementById('narasi');
            const namaDesa = getNamaDesaTerpilih();
            let finalTemplate = template;
            if (namaDesa) {
                finalTemplate = finalTemplate.replace(/\bdesa\b/gi, `Desa ${namaDesa}`);
                finalTemplate = finalTemplate.replace(/\bkelurahan\b/gi, `Kelurahan ${namaDesa}`);
            }
            narasiField.value = finalTemplate;
            document.getElementById('templateModal').classList.remove('show');
            const event = new Event('input', { bubbles: true });
            narasiField.dispatchEvent(event);
            checkInputCompletion();
            showNotification('✅ Template berhasil diterapkan!', 'success');
        };

            const indicator = document.getElementById('supabaseIndicator');

            if (status === 'online') {
                indicator.classList.add('indicator-online');

        function fetchFromGitHub(url) {
            return new Promise(resolve => {
                fetch(url + '?t=' + new Date().getTime())
                    .then(res => res.ok ? res.text() : null)
                    .then(data => resolve(data))
                    .catch(() => resolve(null));
            });
        }

        function loadPiketData() {
            return fetchFromGitHub(GITHUB_URLS.PIKET).then(data => {
                if (data) {
                    JadwalData2.daftarNama = data.trim().split('\n').filter(l => l.trim()).map(n => n.trim());
                    JADWAL_DROPDOWN_IDS.forEach(id => {
                        const select = document.getElementById(id);
                        if (select) {
                            const currentValue = select.value;
                            select.innerHTML = '<option value="">-- Pilih Nama --</option>';
                            JadwalData2.daftarNama.forEach(nama => {
                                const opt = document.createElement('option');
                                opt.value = nama;
                                opt.textContent = nama;
                                select.appendChild(opt);
                            });
                            if (currentValue) select.value = currentValue;
                        }
                    });
                    return true;
                }
                return false;
            });
        }

        function loadHanpanganData() {
            return fetchFromGitHub(GITHUB_URLS.HANPANGAN).then(data => {
                if (data) {
                    const lines = data.trim().split('\n').filter(l => l.trim());
                    if (lines.length) {
                        JadwalData2.daftarHanpangan = lines;
                        const today = new Date();
                        const epochDays = Math.floor(today.getTime() / (24 * 60 * 60 * 1000));
                        const referenceDate = new Date(2024, 0, 1);
                        const epochDaysRef = Math.floor(referenceDate.getTime() / (24 * 60 * 60 * 1000));
                        let offset = (0 - epochDaysRef) % lines.length;
                        if (offset < 0) offset += lines.length;
                        let index = (epochDays + offset) % lines.length;
                        if (index < 0) index += lines.length;
                        JadwalData2.currentHanpangan = lines[index];
                        return true;
                    }
                }
                return false;
            });
        }

        function formatTanggal(date) {
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni",
                "Juli", "Agustus", "September", "Oktober", "November", "Desember"
            ];
            return days[date.getDay()] + ", " + date.getDate() + " " + months[date.getMonth()] + " " + date.getFullYear();
        }

        function formatDateDB(date) {
            return date.toISOString().split('T')[0];
        }

        function updatePreviewJadwal() {
            const now = new Date();
            const tomorrow = new Date();
            tomorrow.setDate(now.getDate() + 1);

            const getVal = (id) => document.getElementById(id)?.value || "";

            const sections = [
                { names: [getVal('j_nama1a_baru'), getVal('j_nama1b_baru')], title: formatTanggal(now), suffix: "" },
                { names: [getVal('j_nama2a_baru'), getVal('j_nama2b_baru')], title: formatTanggal(tomorrow),
                suffix: "" },
                { names: [getVal('j_nama3a_baru'), getVal('j_nama3b_baru')], title: formatTanggal(now),
                    suffix: " (Kediaman)" },
                { names: [getVal('j_nama3c_baru'), getVal('j_nama3d_baru')], title: formatTanggal(tomorrow),
                    suffix: " (Kediaman)" },
                { names: [getVal('j_nama4a_baru'), getVal('j_nama4b_baru')], title: formatTanggal(now),
                    suffix: " (Makodim)" },
                { names: [getVal('j_nama4c_baru'), getVal('j_nama4d_baru')], title: formatTanggal(tomorrow),
                    suffix: " (Makodim)" }
            ];

            let result =
                "_____________________________\n*KORAMIL 1609-05/SUKASADA*\n    *JADWAL DINAS DALAM*\n_____________________________\n\n";
            let sectionCount = 0;

            for (const s of sections) {
                const valid = s.names.filter(n => n && n.trim());
                if (valid.length) {
                    result += String.fromCharCode(65 + sectionCount) + ". " + s.title + s.suffix + "\n";
                    valid.forEach((n, i) => result += "   " + (i + 1) + ". " + n + "\n");
                    result += "\n";
                    sectionCount++;
                }
            }

            if (JadwalData2.currentHanpangan) {
                result += "*🌾Jadwal Hanpangan hari ini :* " + JadwalData2.currentHanpangan + "\n\n";
            }
            result += "*Demikian MMP.*";

            const preview = document.getElementById('j_hasilPesanBaru');
            if (preview) {
                preview.value = result;
                setTimeout(() => {
                    preview.style.height = 'auto';
                    preview.style.height = preview.scrollHeight + 'px';
                }, 10);
            }
        }

        function triggerAutoSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            updatePreviewJadwal();
            autoSaveTimer = setTimeout(() => {
                if (isSupabaseConnected) autoSaveToSupabase();
            }, 1500);
        }

        async function autoSaveToSupabase() {
            if (!supabaseClient || !isSupabaseConnected) return;
            try {
                const getVal = (id) => document.getElementById(id)?.value.trim() || '';
                const now = new Date();
                const tomorrow = new Date();
                tomorrow.setDate(now.getDate() + 1);
                const todayStr = formatDateDB(now);
                const tomorrowStr = formatDateDB(tomorrow);

                const jadwalList = [
                    { tanggal: todayStr, jenis: 'koramil_hari_ini', nama1: getVal('j_nama1a_baru'), nama2: getVal(
                            'j_nama1b_baru') },
                    { tanggal: tomorrowStr, jenis: 'koramil_besok', nama1: getVal('j_nama2a_baru'), nama2: getVal(
                            'j_nama2b_baru') },
                    { tanggal: todayStr, jenis: 'kediaman_hari_ini', nama1: getVal('j_nama3a_baru'), nama2: getVal(
                            'j_nama3b_baru') },
                    { tanggal: tomorrowStr, jenis: 'kediaman_besok', nama1: getVal('j_nama3c_baru'), nama2: getVal(
                            'j_nama3d_baru') },
                    { tanggal: todayStr, jenis: 'makodim_hari_ini', nama1: getVal('j_nama4a_baru'), nama2: getVal(
                            'j_nama4b_baru') },
                    { tanggal: tomorrowStr, jenis: 'makodim_besok', nama1: getVal('j_nama4c_baru'), nama2: getVal(
                            'j_nama4d_baru') }
                ];

                const validJadwal = jadwalList.filter(j => j.nama1 || j.nama2);
                if (validJadwal.length === 0) return;

                await supabaseClient.from('jadwal_piket').delete()
                    .or(`tanggal_jadwal.eq.${todayStr},tanggal_jadwal.eq.${tomorrowStr}`);

                for (const jadwal of validJadwal) {
                    await supabaseClient.from('jadwal_piket').insert([{
                        tanggal_jadwal: jadwal.tanggal,
                        jenis: jadwal.jenis,
                        nama1: jadwal.nama1 || null,
                        nama2: jadwal.nama2 || null,
                        tanggal_input: new Date().toISOString()
                    }]);
                }

                document.getElementById('previewInfo').textContent = '✅ Auto-saved ke Supabase';
                document.getElementById('previewInfo').style.color = '#000';
                setTimeout(() => {
                    document.getElementById('previewInfo').textContent = '✅ Data dari Supabase';
                }, 2000);
            } catch (error) {
                console.error('❌ Auto-save error:', error);
            }
        }

        async function loadDataFromSupabase() {
            if (!supabaseClient || !isSupabaseConnected) return;
            try {
                const now = new Date();
                const tomorrow = new Date();
                tomorrow.setDate(now.getDate() + 1);
                const todayStr = formatDateDB(now);
                const tomorrowStr = formatDateDB(tomorrow);

                const { data, error } = await supabaseClient
                    .from('jadwal_piket')
                    .select('*')
                    .or(`tanggal_jadwal.eq.${todayStr},tanggal_jadwal.eq.${tomorrowStr}`)
                    .order('tanggal_jadwal', { ascending: true });

                if (error) throw error;

                JADWAL_DROPDOWN_IDS.forEach(id => {
                    const select = document.getElementById(id);
                    if (select) select.value = '';
                });

                if (data && data.length > 0) {
                    const mapping = {
                        'koramil_hari_ini': ['j_nama1a_baru', 'j_nama1b_baru'],
                        'koramil_besok': ['j_nama2a_baru', 'j_nama2b_baru'],
                        'kediaman_hari_ini': ['j_nama3a_baru', 'j_nama3b_baru'],
                        'kediaman_besok': ['j_nama3c_baru', 'j_nama3d_baru'],
                        'makodim_hari_ini': ['j_nama4a_baru', 'j_nama4b_baru'],
                        'makodim_besok': ['j_nama4c_baru', 'j_nama4d_baru']
                    };

                    data.forEach(item => {
                        const ids = mapping[item.jenis];
                        if (ids) {
                            if (item.nama1) {
                                const select1 = document.getElementById(ids[0]);
                                if (select1 && JadwalData2.daftarNama.includes(item.nama1)) select1.value = item
                                    .nama1;
                            }
                            if (item.nama2) {
                                const select2 = document.getElementById(ids[1]);
                                if (select2 && JadwalData2.daftarNama.includes(item.nama2)) select2.value = item
                                    .nama2;
                            }
                        }
                    });

                    document.getElementById('previewInfo').textContent = '✅ Data dari Supabase (' + data.length +
                        ' item)';
                    document.getElementById('previewInfo').style.color = '#000';
                } else {
                    document.getElementById('previewInfo').textContent = '📭 Belum ada data, silakan pilih nama';
                    document.getElementById('previewInfo').style.color = '#000';
                }
                updatePreviewJadwal();
            } catch (error) {
                console.error('❌ Error load data:', error);
                document.getElementById('previewInfo').textContent = '❌ Gagal memuat data';
                document.getElementById('previewInfo').style.color = '#000';
            }
        }

        async function initSupabase() {
            updateIndicator('checking', 'Menghubungkan...');
            try {
                if (typeof supabase === 'undefined') {
                    updateIndicator('offline', 'SDK tidak ditemukan');
                    return false;
                }
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { error } = await supabaseClient.from('jadwal_piket').select('id').limit(1);
                if (error) {
                    updateIndicator('offline', 'Error: ' + error.message);
                    isSupabaseConnected = false;
                    return false;
                }
                isSupabaseConnected = true;
                updateIndicator('online', 'Terhubung!');
                await loadDataFromSupabase();
                return true;
            } catch (error) {
                console.error('❌ Error init:', error);
                updateIndicator('offline', 'Gagal konek');
                isSupabaseConnected = false;
                return false;
            }
        }
